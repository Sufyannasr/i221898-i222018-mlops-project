          \ np.nan).fillna(0)\n\n    train_out.to_csv(processed_train_data.path, index=False)\n\
          \    cal_out.to_csv(processed_cal_data.path, index=False)\n    test_out.to_csv(processed_test_data.path,\
          \ index=False)\n\n"
