          \ auc_5: float, cost_5: float,\n    selected_model: Output[Model],\n) ->\
          \ NamedTuple(\"Selection\", [(\"best_model_name\", str), (\"best_recall\"\
          , float), (\"best_auc\", float), (\"best_business_cost\", float)]):\n  \
