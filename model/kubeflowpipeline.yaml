deploymentSpec:
  executors:
    exec-conformal-calibration-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - conformal_calibration_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \ 'scikit-learn' 'joblib' 'xgboost' 'lightgbm'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef conformal_calibration_op(\n    model: Input[Model],\n    cal_data:\
          \ Input[Dataset],\n    calibrated_model: Output[Model],\n    alpha: float\
          \ = 0.05,\n) -> NamedTuple(\"CalibMetrics\", [(\"threshold\", float), (\"\
          empirical_coverage_cal\", float)]):\n    import joblib\n    import numpy\
          \ as np\n    import pandas as pd\n\n    df = pd.read_csv(cal_data.path)\n\
          \    target_col = \"target\"\n    y_cal = df[target_col]\n    X_cal = df.drop(columns=[target_col])\n\
          \n    clf = joblib.load(model.path)\n    proba = clf.predict_proba(X_cal)\n\
          \    true_probs = proba[np.arange(len(y_cal)), y_cal]\n    nonconformity\
          \ = 1 - true_probs\n\n    n = len(nonconformity)\n    quantile = np.ceil((n\
          \ + 1) * (1 - alpha)) / n\n    threshold = np.quantile(nonconformity, quantile,\
          \ method=\"higher\")\n\n    pred_sets = []\n    for i in range(len(X_cal)):\n\
          \        probs = clf.predict_proba(X_cal.iloc[[i]])[0]\n        ncf = 1\
          \ - probs\n        included = ncf <= threshold\n        pred_set = list(np.where(included)[0])\n\
          \        pred_sets.append(pred_set)\n    coverages = [1 if y_cal.iloc[i]\
          \ in pred_set else 0 for i, pred_set in enumerate(pred_sets)]\n    empirical_cov\
          \ = np.mean(coverages)\n\n    calibrated_dict = {\n        \"model\": clf,\n\
          \        \"threshold\": float(threshold),\n        \"alpha\": alpha,\n \
          \       \"classes\": clf.classes_.tolist()\n    }\n    joblib.dump(calibrated_dict,\
          \ calibrated_model.path)\n\n    print(f\"Conformal calibration: alpha={alpha},\
          \ threshold={threshold:.4f}, empirical coverage = {empirical_cov:.3f}\"\
          )\n    return (float(threshold), float(empirical_cov))\n\n"
        image: python:3.11
        resources:
          cpuLimit: 1.0
          memoryLimit: 2.147483648
          resourceCpuLimit: '1'
          resourceMemoryLimit: 2Gi
    exec-deploy-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_op(\n    model: Input[Model],\n    coverage: float,\n\
          \    avg_set_size: float,\n) -> str:\n    print(f\"Deploying conformalized\
          \ model with coverage={coverage:.3f}, average set size={avg_set_size:.2f}\"\
          )\n    print(f\"Model artifact path: {model.path}\")\n    return \"Deployment\
          \ triggered\"\n\n"
        image: python:3.11
        resources:
          cpuLimit: 1.0
          memoryLimit: 1.073741824
          resourceCpuLimit: '1'
          resourceMemoryLimit: 1Gi
    exec-evaluate-conformal-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_conformal_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \ 'scikit-learn' 'joblib' 'xgboost' 'lightgbm'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_conformal_op(\n    calibrated_model: Input[Model],\n\
          \    test_data: Input[Dataset],\n) -> NamedTuple(\"TestMetrics\", [(\"coverage\"\
          , float), (\"avg_set_size\", float), (\"accuracy_original\", float)]):\n\
          \    import numpy as np\n    import pandas as pd\n    import joblib\n\n\
          \    df = pd.read_csv(test_data.path)\n    target_col = \"target\"\n   \
          \ y_test = df[target_col]\n    X_test = df.drop(columns=[target_col])\n\n\
          \    calib = joblib.load(calibrated_model.path)\n    clf = calib[\"model\"\
          ]\n    threshold = calib[\"threshold\"]\n\n    proba = clf.predict_proba(X_test)\n\
          \    pred_sets = []\n    for i in range(len(X_test)):\n        probs = proba[i]\n\
          \        ncf = 1 - probs\n        included = ncf <= threshold\n        pred_set\
          \ = list(np.where(included)[0])\n        pred_sets.append(pred_set)\n\n\
          \    coverage = np.mean([1 if y_test.iloc[i] in pred_set else 0 for i, pred_set\
          \ in enumerate(pred_sets)])\n    avg_set_size = np.mean([len(ps) for ps\
          \ in pred_sets])\n    y_pred = clf.predict(X_test)\n    accuracy = np.mean(y_pred\
          \ == y_test)\n\n    print(f\"Test results: Coverage = {coverage:.3f} (target\
          \ = {1-calib['alpha']:.3f}), Avg set size = {avg_set_size:.2f}, Accuracy\
          \ = {accuracy:.3f}\")\n    return (float(coverage), float(avg_set_size),\
          \ float(accuracy))\n\n"
        image: python:3.11
        resources:
          cpuLimit: 1.0
          memoryLimit: 1.073741824
          resourceCpuLimit: '1'
          resourceMemoryLimit: 1Gi
    exec-evaluate-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'scikit-learn'\
          \ 'joblib' 'xgboost' 'lightgbm'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_op(\n    data: Input[Dataset],\n    model: Input[Model],\n\
          \    fraud_loss_cost: float = 500.0,\n    false_alarm_cost: float = 10.0,\n\
