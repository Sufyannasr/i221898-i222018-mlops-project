          \ median_vals=median_vals, cat_mappings=cat_mappings)\n    X_test, y_test,\
          \ _, _ = preprocess_single(test_df, target_col, fit=False, median_vals=median_vals,\
          \ cat_mappings=cat_mappings)\n\n    train_out = pd.concat([X_train, y_train],\
