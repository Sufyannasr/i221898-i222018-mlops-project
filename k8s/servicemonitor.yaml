apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: breast-cancer-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: breast-cancer-api
  endpoints:
    - port: http
      path: /metrics
      interval: 5s