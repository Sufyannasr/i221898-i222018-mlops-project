name: MLOps CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r model/requirements.txt

      # -----------------------
      # Force MLflow to avoid broken local tracking in CI
      # -----------------------
      - name: Set MLflow environment
        run: |
          echo "MLFLOW_TRACKING_URI=sqlite:///mlflow.db" >> $GITHUB_ENV

      # -----------------------
      # Train model
      # -----------------------
      - name: Train model
        run: |
          cd model
          python train.py

      # -----------------------
      # Validate artifact
      # -----------------------
      - name: Validate model artifact
        run: |
          test -f model/model.pkl

      # -----------------------
      # Optional: upload artifact to GitHub
      # -----------------------
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: model/model.pkl
